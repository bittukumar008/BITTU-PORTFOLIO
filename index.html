<!doctype html>
<html lang="en">
  <head>
    <script>
      /**
       * Ultimate defensive fix for "Cannot set property fetch of #<Window> which has only a getter"
       * This script must run before any other script.
       */
      (function() {
        var _fetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            get: function() { return _fetch; },
            set: function(v) { _fetch = v; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          // If defineProperty fails, try a simple assignment in a non-strict way
          try { window.fetch = _fetch; } catch (e2) {}
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bittu Kumar | Developer Portfolio</title>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
